<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – BudgetWise</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to your BudgetWise account</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="btn-primary" type="submit">Log In</button>
        <div id="error" class="text-danger text-center" style="display:none; margin-top:0.75rem;"></div>
      </form>

      <p class="footer-link">
        Need a new account? <a href="./signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    (function () {
      const API_BASE = '/api/v1';

      if (localStorage.getItem('token')) {
        window.location.replace('./dashboard.html');
        return;
      }

      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('error');
      const submitBtn = form.querySelector('button[type="submit"]');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in…';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || 'Login failed');
          localStorage.setItem('token', data.token);
          window.location.replace('./dashboard.html');
        } catch (err) {
          errorEl.textContent = err.message || 'Login failed';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log In';
        }
      });
    })();
  </script>
</body>
</html>
